# OpenEvolve config for Frontier-CS algorithmic/174

max_iterations: 100
checkpoint_interval: 10
log_level: "DEBUG"

# LLM configuration
llm:
  models:
    - name: "o3"
      weight: 1.0
      api_base: "https://api.openai.com/v1"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 32000
  timeout: 600

# Prompt configuration
prompt:
  system_message: |
    You are a competitive programmer. You will be given a problem statement, please implement a solution in C++. The execution time and memory limit are also stated in the statement so be aware of the complexity of the program. Your response should ONLY contain the C++ code, with no additional explanation or text.
    
    Problem:
    
    # Graph 3-Coloring
    
    ## Problem
    
    You are given an undirected graph with n vertices and m edges.
    Your task is to assign each vertex one of three colors.
    
    The objective is to minimize the number of conflicting edges.
    An edge is conflicting if its two endpoints have the same color.
    
    ## Input Format
    
    - Line 1: two integers n and m (1 ≤ n ≤ 1000, 0 ≤ m ≤ n(n−1)/2)
    - Next m lines: two integers u v (1 ≤ u, v ≤ n, u ≠ v)
    
    The graph may be disconnected.
    There are no multiple edges or self-loops.
    
    ## Output Format
    
    - Output exactly one line:
      - n integers c₁ c₂ … cₙ
      - each cᵢ ∈ {1, 2, 3}
    
    ## Scoring
    
    Let:
    - m be the number of edges
    - b be the number of conflicting edges
    
    Score is defined as:
    - If m > 0:  score = 1 − b / m
    - If m = 0:  score = 1
    
    The score is clamped to [0, 1].
  num_top_programs: 3
  use_template_stochasticity: true

# Database configuration
database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7

# Evaluator configuration
evaluator:
  timeout: 30
  cascade_evaluation: false
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 4
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: false
allow_full_rewrites: true
max_code_length: 60000
