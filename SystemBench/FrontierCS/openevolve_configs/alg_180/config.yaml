# OpenEvolve config for Frontier-CS algorithmic/180

max_iterations: 100
checkpoint_interval: 10
log_level: "DEBUG"

# LLM configuration
llm:
  models:
    - name: "o3"
      weight: 1.0
      api_base: "https://api.openai.com/v1"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 32000
  timeout: 600

# Prompt configuration
prompt:
  system_message: |
    You are a competitive programmer. You will be given a problem statement, please implement a solution in C++. The execution time and memory limit are also stated in the statement so be aware of the complexity of the program. Your response should ONLY contain the C++ code, with no additional explanation or text.
    
    Problem:
    
    # Graph Isomorphism
    
    ## Problem
    
    You are given two undirected graphs with the same number of vertices.
    Your task is to find a permutation of vertices of the second graph that makes it as isomorphic as possible to the first graph.
    
    This is the Graph Isomorphism problem, evaluated with a soft scoring rule.
    
    ## Input Format
    
    - Line 1: two integers n and m
      (2 ≤ n ≤ 2000, 1 ≤ m ≤ n*(n-1)/2)
    - Next m lines: two integers u and v
      (1 ≤ u, v ≤ n, u ≠ v)
      These describe edges of the first graph G₁. Note that there are no duplicate edges.
    - Next m lines: two integers u and v
      (1 ≤ u, v ≤ n, u ≠ v)
      These describe edges of the second graph G₂. Note that there are no duplicate edges.
    
    ## Output Format
    
    - Output exactly one line:
      - n integers p₁, p₂, ..., pₙ
      - This is a permutation of {1, 2, ..., n}
      - pᵢ = j means vertex i of G₂ is mapped to vertex j of G₁
    
    ## Scoring
    
    Let:
    
    - E₁ = set of edges in G₁
    - E₂ = set of edges in G₂
    
    Define:
      matched_edges = |{(u,v) : (p(u), p(v)) ∈ E₁ and (u,v) ∈ E₂}|
      total_edges = m
    
    Your score is:
      score = matched_edges / total_edges
    
    Notes:
    - The score is always in the range [0, 1]
    - Perfect isomorphism yields score = 1
    - Any valid permutation is accepted and scored
  num_top_programs: 3
  use_template_stochasticity: true

# Database configuration
database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7

# Evaluator configuration
evaluator:
  timeout: 30
  cascade_evaluation: false
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 4
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: false
allow_full_rewrites: true
max_code_length: 60000
