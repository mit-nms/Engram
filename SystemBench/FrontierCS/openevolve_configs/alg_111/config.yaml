# OpenEvolve config for Frontier-CS algorithmic/111

max_iterations: 100
checkpoint_interval: 10
log_level: "DEBUG"

# LLM configuration
llm:
  models:
    - name: "o3"
      weight: 1.0
      api_base: "https://api.openai.com/v1"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 32000
  timeout: 600

# Prompt configuration
prompt:
  system_message: |
    You are a competitive programmer. You will be given a problem statement, please implement a solution in C++. The execution time and memory limit are also stated in the statement so be aware of the complexity of the program. Your response should ONLY contain the C++ code, with no additional explanation or text.
    
    Problem:
    
    Problem: Distinct Pairwise XOR Set
    
    Time Limit: 1 second
    Memory Limit: 512 MB
    
    Description
    Given an integer n, find a subset S ⊆ {1, 2, ..., n} such that:
    1) For all pairs (a, b) with a, b ∈ S and a < b, the values (a XOR b) are all distinct (i.e., no two different unordered pairs produce the same XOR).
    2) |S| ≥ floor(sqrt(n / 2)).
    
    Input
    A single integer n (1 ≤ n ≤ 10^7).
    
    Output
    - First line: an integer m — the size of the set S.
    - Second line: m distinct integers in the range [1, n] — the elements of S, in any order.
    
    Notes
    - Any valid S is accepted. You do NOT need to maximize m; you only need m ≥ floor(sqrt(n/2)).
    - The pairwise XOR distinctness means the set {a_i XOR a_j | 1 ≤ i < j ≤ m} has size m*(m-1)/2.
    - Multiple correct outputs may exist for the same n.
    - Print out the sequence with the longest length.
    
    Sample
    Input
    49
    Output
    4
    1 2 3 4
  num_top_programs: 3
  use_template_stochasticity: true

# Database configuration
database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7

# Evaluator configuration
evaluator:
  timeout: 30
  cascade_evaluation: false
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 4
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: false
allow_full_rewrites: true
max_code_length: 60000
