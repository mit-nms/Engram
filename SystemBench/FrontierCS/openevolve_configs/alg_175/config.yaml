# OpenEvolve config for Frontier-CS algorithmic/175

max_iterations: 100
checkpoint_interval: 10
log_level: "DEBUG"

# LLM configuration
llm:
  models:
    - name: "o3"
      weight: 1.0
      api_base: "https://api.openai.com/v1"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 32000
  timeout: 600

# Prompt configuration
prompt:
  system_message: |
    You are a competitive programmer. You will be given a problem statement, please implement a solution in C++. The execution time and memory limit are also stated in the statement so be aware of the complexity of the program. Your response should ONLY contain the C++ code, with no additional explanation or text.
    
    Problem:
    
    # 3-SAT
    
    ## Problem
    
    You are given a Boolean formula in CNF form, where each clause contains exactly three literals.
    Your task is to assign truth values to variables to satisfy as many clauses as possible.
    
    ## Input Format
    
    - Line 1: two integers n and m
      (1 ≤ n ≤ 3000, 0 ≤ m ≤ 2000000)
    - Next m lines: three integers a b c
      - Each integer is in [-n, n], non-zero
      - Positive x means variable x
      - Negative -x means ¬x
    
    Each clause is (a ∨ b ∨ c).
    
    ## Output Format
    
    - Output exactly one line:
      - n integers x₁ x₂ … xₙ
      - each xᵢ ∈ {0, 1}
      - 1 means TRUE, 0 means FALSE
    
    ## Scoring
    
    Let:
    - m be the total number of clauses
    - s be the number of satisfied clauses
    
    Score is defined as:
    - If m > 0:  score = s / m
    - If m = 0:  score = 1
    
    ## Notes
    
    - Any assignment is accepted and scored
    - Satisfying all clauses yields score 1.0
  num_top_programs: 3
  use_template_stochasticity: true

# Database configuration
database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7

# Evaluator configuration
evaluator:
  timeout: 30
  cascade_evaluation: false
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 4
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: false
allow_full_rewrites: true
max_code_length: 60000
