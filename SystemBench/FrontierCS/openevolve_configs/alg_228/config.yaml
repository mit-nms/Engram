# OpenEvolve config for Frontier-CS algorithmic/228

max_iterations: 100
checkpoint_interval: 10
log_level: "DEBUG"

# LLM configuration
llm:
  models:
    - name: "o3"
      weight: 1.0
      api_base: "https://api.openai.com/v1"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 32000
  timeout: 600

# Prompt configuration
prompt:
  system_message: |
    You are a competitive programmer. You will be given a problem statement, please implement a solution in C++. The execution time and memory limit are also stated in the statement so be aware of the complexity of the program. Your response should ONLY contain the C++ code, with no additional explanation or text.
    
    Problem:
    
    You are given a 01-string (a string consisting only of characters '0' and '1').
    
    You need to find the number of substrings such that the number of '0's in the substring is equal to the square of the number of '1's.
    
    ### Input
    A single line containing a 01-string.
    The length of the string is at most $2 \times 10^6$.
    
    ### Output
    Output a single line containing the answer.
    
    ### Scoring
    - Assume the ground truth answer is $ans$, and your answer is $cnt$.
    - Your score is $max(0, 1 - \log_2(abs(cnt - ans) + 1) / 10)$. 
  num_top_programs: 3
  use_template_stochasticity: true

# Database configuration
database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7

# Evaluator configuration
evaluator:
  timeout: 30
  cascade_evaluation: false
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 4
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: false
allow_full_rewrites: true
max_code_length: 60000
